<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proanfun | About</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color:#0A0A0C;
            --card-bg:#16161A;
            --card-bg-light:#1B1B20;
            --text-color:#6e0eec;
            --text-muted:#8C8C95;
            --accent-color:#6e0eec;
            --accent-hover:#5614acc0;
            --accent-deep:#500199;
            --accent-pale:#F1DFA8;
            --border-color:#2B2620;
            --border-radius:4px;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 0%, rgba(201,161,75,0.05) 0%, transparent 45%),
                radial-gradient(circle at 85% 100%, rgba(201,161,75,0.04) 0%, transparent 45%);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 90px 24px 60px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .eyebrow {
            display: inline-block;
            color: var(--accent-color);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, var(--accent-pale) 0%, var(--accent-color) 45%, var(--accent-hover) 60%, var(--accent-deep) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 22px;
            line-height: 1.1;
        }

        .important-note {
            display: inline-block;
            text-align: left;
            background-color: rgba(201, 161, 75, 0.06);
            border-left: 3px solid var(--accent-color);
            color: var(--text-muted);
            padding: 14px 18px;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            font-size: 0.92rem;
            letter-spacing: 0.2px;
        }

        .important-note strong {
            color: var(--accent-hover);
        }

        section {
            position: relative;
            background: linear-gradient(160deg, var(--card-bg-light) 0%, var(--card-bg) 100%);
            padding: 36px 40px;
            margin-bottom: 26px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 30px -10px rgba(0,0,0,0.5);
        }

        section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-color), transparent);
            border-radius: var(--border-radius) 0 0 var(--border-radius);
        }

        h3 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--accent-hover);
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 0.2px;
        }

        code {
            background-color: var(--code-bg);
            color: var(--accent-hover);
            padding: 2px 7px;
            border-radius: 3px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
        }

        .nav-buttons {
            display: flex;
            gap: 14px;
            margin-top: 36px;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--accent-color);
            outline: none;
            padding: 13px 28px;
            border-radius: var(--border-radius);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: transparent;
            color: var(--accent-hover) !important;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-deep) 0%, var(--accent-color) 50%, var(--accent-hover) 100%);
            color: #14110A !important;
            border-color: var(--accent-hover);
            box-shadow: 0 6px 20px -4px rgba(201, 161, 75, 0.45);
        }

        .btn:active {
            transform: translateY(1px);
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
  
    <div class="container">
        <header>
            <h1>Sorry this page is in progress</h1>
        </header>
    </div>

</body>
</html>
