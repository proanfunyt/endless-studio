<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proanfun | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color:#0A0A0C;
            --card-bg:#16161A;
            --card-bg-light:#1B1B20;
            --text-color:#6e0eec;
            --text-muted:#8C8C95;
            --accent-color:#6e0eec;
            --accent-hover:#5614acc0;
            --accent-deep:#500199;
            --accent-pale:#F1DFA8;
            --border-color:#2B2620;
            --border-radius:4px;
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 0%, rgba(201,161,75,0.05) 0%, transparent 45%),
                radial-gradient(circle at 85% 100%, rgba(201,161,75,0.04) 0%, transparent 45%);
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
        }

        .hero-banner {
            position: relative;
            background: #0F0F12;
            padding: 130px 20px 110px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
        }

        .hero-banner::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(22, 184, 7, 0.1) 0%, rgba(5, 180, 58, 0) 60%);
            pointer-events: none;
        }

        .hero-banner::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
        }

        .eyebrow {
            position: relative;
            display: inline-block;
            color: var(--accent-color);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 22px;
        }

        .welcome-title {
            position: relative;
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, var(--accent-pale) 0%, var(--accent-color) 45%, var(--accent-hover) 60%, var(--accent-deep) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 18px;
            line-height: 1.1;
        }

        .subtitle {
            position: relative;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.3px;
            max-width: 520px;
            margin: 0 auto;
        }

        .content-container {
            max-width: 760px;
            margin: 70px auto;
            padding: 0 24px;
        }

        section {
            position: relative;
            background: linear-gradient(160deg, var(--card-bg-light) 0%, var(--card-bg) 100%);
            padding: 38px 42px;
            margin-bottom: 28px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 30px -10px rgba(0,0,0,0.5);
        }

        section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-color), transparent);
            border-radius: var(--border-radius) 0 0 var(--border-radius);
        }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--accent-hover);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 14px;
            letter-spacing: 0.2px;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 20px 0;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--accent-color);
            outline: none;
            padding: 13px 32px;
            border-radius: var(--border-radius);
            font-family: 'Montserrat', sans-serif;
            background: transparent;
            color: var(--accent-hover) !important;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
            text-decoration: none;
            transition: all 0.25s ease;
            margin-top: 6px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-deep) 0%, var(--accent-color) 50%, var(--accent-hover) 100%);
            color: #14110A !important;
            border-color: var(--accent-hover);
            box-shadow: 0 6px 20px -4px rgba(201, 161, 75, 0.45);
            text-decoration: none;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 1px;
            background-color: #0C0C0F;
        }

    
</style> 
    </style>
    <body>
      
      <div class="hero-banner">
      <span class="eyebrow">LiamsLevelUp</span>
      <h1 class="welcome-title">Welcome</h1>
      <p class="subtitle">Welcome to endless studio</p>
    </div>


    <section class="content-container">
      <h2>My movies</h2>
      <p>These are my movies.</p>

    </hr>
      <p>click this to see all my movies!</p>
      <a href="continue1.html" class="btn-primary">My Movies</a>
    </section>

    <section class="content-container">
      <h2>About Me</h2>
      <p>This is full of information about me, such as why i want to make movies.</p>

    </hr>
      <p>click this to know all about me!</p>
      <a href="continue.html" class="btn-primary">All about me</a>
    </section>

    </body>
    </head>
</html>
